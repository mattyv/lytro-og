<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lytro OG — Living Picture Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
/* Lytro OG — living-picture viewer
   Palette: lens-coating petrol ground + heritage amber accent.
   Type: Space Grotesk (UI), JetBrains Mono (telemetry). */

:root {
  --bg: #0a1413;
  --surface: #0f1f1d;
  --surface-2: #0c1817;
  --line: #203a35;
  --line-soft: #16302b;
  --hi: #eaf2ef;
  --dim: #6f8c86;
  --amber: #ffb23e;
  --amber-soft: #ffce82;
  --cool: #5ec8d8;
  --r: 4px;
}

* { box-sizing: border-box; }

html, body { height: 100%; }

body {
  margin: 0;
  background:
    radial-gradient(120% 90% at 50% -10%, #13302c 0%, var(--bg) 55%);
  color: var(--hi);
  font-family: "Space Grotesk", system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body.dragging::after {
  content: "Drop to load";
  position: fixed;
  inset: 12px;
  z-index: 50;
  display: grid;
  place-items: center;
  border: 1px dashed var(--amber);
  border-radius: 8px;
  background: rgba(10, 20, 19, 0.72);
  color: var(--amber);
  font-size: 18px;
  letter-spacing: 0.04em;
  pointer-events: none;
}

/* ---- header ---- */
header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line-soft);
}
.brand {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.02em;
}
.brand b { color: var(--amber); font-weight: 700; }
.tag {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.02em;
}
header .spacer { flex: 1; }

button.ctl {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  color: var(--hi);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 7px 11px;
  cursor: pointer;
  letter-spacing: 0.02em;
}
button.ctl:hover { border-color: var(--amber); color: var(--amber-soft); }
button.ctl:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
button.ctl[aria-pressed="true"] {
  background: rgba(255, 178, 62, 0.12);
  border-color: var(--amber);
  color: var(--amber);
}

/* ---- stage ---- */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px 22px 10px;
  min-height: 0;
}
.stagewrap {
  position: relative;
  flex: 1;
  min-height: 0;
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  background:
    linear-gradient(var(--surface-2), var(--bg)),
    repeating-linear-gradient(45deg, transparent 0 9px, rgba(255,255,255,0.012) 9px 10px);
  overflow: hidden;
}
.stagewrap::before { /* faint corner ticks, like a viewfinder */
  content: "";
  position: absolute;
  inset: 10px;
  border: 1px solid transparent;
  background:
    linear-gradient(var(--line), var(--line)) left top / 18px 1px no-repeat,
    linear-gradient(var(--line), var(--line)) left top / 1px 18px no-repeat,
    linear-gradient(var(--line), var(--line)) right top / 18px 1px no-repeat,
    linear-gradient(var(--line), var(--line)) right top / 1px 18px no-repeat,
    linear-gradient(var(--line), var(--line)) left bottom / 18px 1px no-repeat,
    linear-gradient(var(--line), var(--line)) left bottom / 1px 18px no-repeat,
    linear-gradient(var(--line), var(--line)) right bottom / 18px 1px no-repeat,
    linear-gradient(var(--line), var(--line)) right bottom / 1px 18px no-repeat;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
.stagewrap.loaded::before { opacity: 1; }
#stage {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  touch-action: none;
}
#stage.pulse { animation: pulse 0.32s ease-out; }
@keyframes pulse {
  from { filter: brightness(1.18); }
  to { filter: brightness(1); }
}

.empty-hint {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  text-align: center;
  color: var(--dim);
  font-size: 14px;
  pointer-events: none;
}
.stagewrap.loaded .empty-hint { display: none; }

/* ---- focus-stack rail ---- */
.rail-label {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.rail {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tick {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  color: var(--dim);
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: var(--r);
  padding: 5px 8px;
  cursor: pointer;
  min-width: 38px;
}
.tick:hover { color: var(--hi); border-color: var(--line); }
.tick:focus-visible { outline: 2px solid var(--amber); outline-offset: 1px; }
.tick.on {
  color: var(--bg);
  background: var(--amber);
  border-color: var(--amber);
  font-weight: 600;
}

/* ---- footer / telemetry ---- */
footer {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 22px 16px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  color: var(--dim);
}
.status { color: var(--dim); }
.status.ok { color: var(--cool); }
.status.error { color: #ff8a6b; }
footer .spacer { flex: 1; }
footer .hint { color: var(--line); }
footer .hint b { color: var(--dim); font-weight: 400; }

@media (max-width: 560px) {
  header { flex-wrap: wrap; gap: 8px 14px; }
  main { padding: 12px 14px 8px; }
  footer { flex-wrap: wrap; padding: 9px 14px 14px; }
}

@media (prefers-reduced-motion: reduce) {
  #stage.pulse { animation: none; }
  .stagewrap.loaded::before { transition: none; }
}

</style>
  </head>
  <body>
    <header>
      <span class="brand">Lytro <b>OG</b></span>
      <span class="tag">living-picture viewer</span>
      <span class="spacer"></span>
      <button id="depthBtn" class="ctl" aria-pressed="false" title="Toggle depth map (D)">depth map</button>
      <button id="loadBtn" class="ctl">load .lfp</button>
      <input id="file" type="file" accept=".lfp,.lfr" hidden />
    </header>

    <main>
      <div id="stagewrap" class="stagewrap">
        <canvas id="stage"></canvas>
        <div class="empty-hint">move across the image to refocus · drop a .lfp to load your own</div>
      </div>
      <div>
        <div class="rail-label">focus stack — λ planes</div>
        <div id="rail" class="rail"></div>
      </div>
    </main>

    <footer>
      <span id="status" class="status">Loading…</span>
      <span class="spacer"></span>
      <span class="hint"><b>hover</b> refocus &nbsp;·&nbsp; <b>click</b> lock &nbsp;·&nbsp; <b>D</b> depth</span>
    </footer>

<script>
// lfp.js — parse a Lytro "cooked"/web .LFP (focus-stack + depth grid).
// Pure browser JS, no build step. Exposes window.LFP.parse(arrayBuffer).
//
// Container layout (confirmed against real files):
//   file: 8-byte magic 89 4C 46 50 0D 0A 1A 0A, then sections begin at 0x10
//   section header = 0x60 bytes:
//     +3   type byte  (0x4D 'M' metadata JSON, 0x43 'C' component blob)
//     +12  uint32 big-endian content length
//     +16  48-byte name field ("sha1-..." ref, null padded)
//     +0x60 content; whole section padded up to a 0x10 boundary
//
// The metadata 'M' section is JSON. The focus stack lives at
//   meta.views[0].accelerations[0]:
//     .perImage[]  -> { imageRef, focus }   (focus is a lambda value)
//     .depthMap    -> { imageRef, width, height, minLambda, maxLambda }
//   depthMap bytes are little-endian float32, one lambda per grid cell.

(function (global) {
  const MAGIC = [0x89, 0x4c, 0x46]; // \x89 L F
  const HEADER = 0x60;

  function sections(buf) {
    const dv = new DataView(buf);
    const bytes = new Uint8Array(buf);
    const dec = new TextDecoder();
    const out = [];
    let pos = 0x10;
    while (pos < buf.byteLength) {
      if (!(bytes[pos] === MAGIC[0] && bytes[pos + 1] === MAGIC[1] && bytes[pos + 2] === MAGIC[2])) break;
      const type = bytes[pos + 3];
      const len = dv.getUint32(pos + 12, false);
      const name = dec
        .decode(bytes.subarray(pos + 16, pos + 16 + 0x30))
        .replace(/\0/g, "");
      const start = pos + HEADER;
      out.push({ type, name, start, len });
      const total = len + HEADER;
      const rem = total % 0x10;
      pos += rem ? total - rem + 0x10 : total;
    }
    return out;
  }

  function parse(buf) {
    const secs = sections(buf);
    if (!secs.length) throw new Error("Not an LFP file (no sections found).");

    const dec = new TextDecoder();
    const metaSec = secs.find((s) => s.type === 0x4d);
    if (!metaSec) throw new Error("No metadata section — is this a cooked/web .LFP? Raw camera .LFR isn't supported yet.");

    let meta;
    try {
      meta = JSON.parse(dec.decode(new Uint8Array(buf, metaSec.start, metaSec.len)));
    } catch (e) {
      throw new Error("Metadata isn't valid JSON.");
    }

    const accel = meta?.views?.[0]?.accelerations?.[0];
    if (!accel || accel.kind !== "focusStack" || !accel.perImage) {
      throw new Error("No focus stack in this file — nothing to refocus.");
    }

    const byName = new Map(secs.map((s) => [s.name, s]));
    const toBlobURL = (sec) =>
      URL.createObjectURL(new Blob([buf.slice(sec.start, sec.start + sec.len)]));

    const frames = accel.perImage
      .slice()
      .sort((a, b) => a.focus - b.focus)
      .map((p) => {
        const sec = byName.get(p.imageRef);
        if (!sec) return null;
        return { focus: p.focus, url: toBlobURL(sec) };
      })
      .filter(Boolean);

    if (!frames.length) throw new Error("Focus-stack frames are missing from the file.");

    const dm = accel.depthMap;
    let depth = null;
    if (dm && byName.has(dm.imageRef)) {
      const s = byName.get(dm.imageRef);
      depth = {
        w: dm.width,
        h: dm.height,
        min: dm.minLambda,
        max: dm.maxLambda,
        data: new Float32Array(buf.slice(s.start, s.start + s.len)),
      };
    }

    return {
      frames,
      depth,
      width: accel.width || 704,
      height: accel.height || 480,
    };
  }

  // Lambda (focus depth) at normalized image coords u,v in [0,1].
  function lambdaAt(depth, u, v) {
    if (!depth) return null;
    const gx = Math.min(depth.w - 1, Math.max(0, Math.floor(u * depth.w)));
    const gy = Math.min(depth.h - 1, Math.max(0, Math.floor(v * depth.h)));
    return depth.data[gy * depth.w + gx];
  }

  function nearestFrame(frames, lambda) {
    let bi = Math.floor(frames.length / 2),
      bd = Infinity;
    for (let i = 0; i < frames.length; i++) {
      const d = Math.abs(frames[i].focus - lambda);
      if (d < bd) {
        bd = d;
        bi = i;
      }
    }
    return bi;
  }

  global.LFP = { parse, lambdaAt, nearestFrame };
})(window);

<script>
// viewer.js — the focusing console. Loads frames, refocuses on pointer move,
// draws the depth HUD + crosshair, the focus-stack rail, and a depth heatmap.

(function () {
  const COOL = [0x5e, 0xc8, 0xd8]; // near-focus end of the depth ramp
  const WARM = [0xff, 0xb2, 0x3e]; // far-focus end / active accent

  const el = (id) => document.getElementById(id);
  const stage = el("stage");
  const ctx = stage.getContext("2d");
  const railEl = el("rail");
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  let model = null; // { frames:[{focus,url,img}], depth, width, height }
  let active = 0; // index into frames
  let fade = 1; // 0..1 crossfade progress
  let prevActive = 0;
  let imgRect = { x: 0, y: 0, w: 0, h: 0 };
  let cursor = null; // {x,y} in canvas px, or null
  let showDepth = false;
  let depthCanvas = null;

  // ---------- loading ----------
  function setStatus(msg, kind) {
    const s = el("status");
    s.textContent = msg || "";
    s.className = "status" + (kind ? " " + kind : "");
  }

  function loadImage(url) {
    return new Promise((res, rej) => {
      const im = new Image();
      im.onload = () => res(im);
      im.onerror = () => rej(new Error("frame decode failed"));
      im.src = url;
    });
  }

  async function load(buf, label) {
    setStatus("Reading " + (label || "file") + "…");
    let parsed;
    try {
      parsed = window.LFP.parse(buf);
    } catch (e) {
      setStatus(e.message, "error");
      return;
    }
    try {
      const imgs = await Promise.all(parsed.frames.map((f) => loadImage(f.url)));
      parsed.frames.forEach((f, i) => (f.img = imgs[i]));
    } catch (e) {
      setStatus("Couldn't decode the focus-stack images.", "error");
      return;
    }
    if (model) model.frames.forEach((f) => URL.revokeObjectURL(f.url));
    model = parsed;
    active = prevActive = Math.floor(model.frames.length / 2);
    fade = 1;
    showDepth = false;
    el("depthBtn").setAttribute("aria-pressed", "false");
    depthCanvas = model.depth ? buildDepthCanvas(model.depth) : null;
    buildRail();
    resize();
    setStatus(
      model.frames.length + " focus planes" +
        (model.depth ? " · depth " + model.depth.w + "×" + model.depth.h : " · no depth map"),
      "ok"
    );
    el("stagewrap").classList.add("loaded");
  }

  function loadFiles(fileList) {
    const file = [...fileList].find((f) => /\.(lfp|lfr)$/i.test(f.name)) || fileList[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => load(r.result, file.name);
    r.readAsArrayBuffer(file);
  }

  // ---------- depth heatmap ----------
  function ramp(t) {
    t = Math.min(1, Math.max(0, t));
    return [0, 1, 2].map((i) => Math.round(COOL[i] + (WARM[i] - COOL[i]) * t));
  }
  function buildDepthCanvas(d) {
    const c = document.createElement("canvas");
    c.width = d.w;
    c.height = d.h;
    const cc = c.getContext("2d");
    const id = cc.createImageData(d.w, d.h);
    const span = d.max - d.min || 1;
    for (let i = 0; i < d.data.length; i++) {
      const [r, g, b] = ramp((d.data[i] - d.min) / span);
      id.data[i * 4] = r;
      id.data[i * 4 + 1] = g;
      id.data[i * 4 + 2] = b;
      id.data[i * 4 + 3] = 255;
    }
    cc.putImageData(id, 0, 0);
    return c;
  }

  // ---------- focus-stack rail ----------
  function buildRail() {
    railEl.innerHTML = "";
    model.frames.forEach((f, i) => {
      const t = document.createElement("button");
      t.className = "tick";
      t.title = "λ " + f.focus;
      t.textContent = f.focus;
      t.addEventListener("click", () => {
        cursor = null;
        setActive(i);
      });
      railEl.appendChild(t);
    });
    markRail();
  }
  function markRail() {
    [...railEl.children].forEach((c, i) =>
      c.classList.toggle("on", i === active)
    );
  }

  // ---------- refocus ----------
  function setActive(i) {
    if (i === active) return;
    prevActive = active;
    active = i;
    fade = reduceMotion ? 1 : 0;
    markRail();
  }
  function refocusFromCursor() {
    if (!cursor || !model || !model.depth) return;
    const u = (cursor.x - imgRect.x) / imgRect.w;
    const v = (cursor.y - imgRect.y) / imgRect.h;
    if (u < 0 || u > 1 || v < 0 || v > 1) return;
    const lambda = window.LFP.lambdaAt(model.depth, u, v);
    setActive(window.LFP.nearestFrame(model.frames, lambda));
  }

  // ---------- layout + render ----------
  function resize() {
    const wrap = el("stagewrap");
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const W = wrap.clientWidth,
      H = wrap.clientHeight;
    stage.width = W * dpr;
    stage.height = H * dpr;
    stage.style.width = W + "px";
    stage.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (model) {
      const ar = model.width / model.height;
      let w = W,
        h = W / ar;
      if (h > H) {
        h = H;
        w = H * ar;
      }
      imgRect = { x: (W - w) / 2, y: (H - h) / 2, w, h };
    }
  }

  function lerpFrameDraw() {
    const r = imgRect;
    const cur = model.frames[active].img;
    if (fade < 1 && model.frames[prevActive]) {
      ctx.globalAlpha = 1;
      ctx.drawImage(model.frames[prevActive].img, r.x, r.y, r.w, r.h);
      ctx.globalAlpha = fade;
      ctx.drawImage(cur, r.x, r.y, r.w, r.h);
      ctx.globalAlpha = 1;
    } else {
      ctx.drawImage(cur, r.x, r.y, r.w, r.h);
    }
  }

  function drawHUD() {
    const r = imgRect;
    if (showDepth && depthCanvas) {
      ctx.globalAlpha = 0.55;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(depthCanvas, r.x, r.y, r.w, r.h);
      ctx.globalAlpha = 1;
    }
    // crosshair + readout
    if (cursor && cursor.x >= r.x && cursor.x <= r.x + r.w && cursor.y >= r.y && cursor.y <= r.y + r.h) {
      const x = cursor.x,
        y = cursor.y;
      ctx.strokeStyle = "rgba(255,178,62,0.9)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, r.y);
      ctx.lineTo(x, r.y + r.h);
      ctx.moveTo(r.x, y);
      ctx.lineTo(r.x + r.w, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.stroke();

      const f = model.frames[active];
      const u = (x - r.x) / r.w,
        v = (y - r.y) / r.h;
      const lam = model.depth ? window.LFP.lambdaAt(model.depth, u, v) : f.focus;
      const label = "λ " + lam.toFixed(1) + "   plane " + (active + 1) + "/" + model.frames.length;
      ctx.font = "12px 'JetBrains Mono', ui-monospace, monospace";
      const pad = 7,
        tw = ctx.measureText(label).width + pad * 2;
      let bx = x + 14,
        by = y + 14;
      if (bx + tw > r.x + r.w) bx = x - 14 - tw;
      if (by + 22 > r.y + r.h) by = y - 14 - 22;
      ctx.fillStyle = "rgba(7,18,17,0.85)";
      ctx.fillRect(bx, by, tw, 22);
      ctx.strokeStyle = "rgba(255,178,62,0.5)";
      ctx.strokeRect(bx + 0.5, by + 0.5, tw, 22);
      ctx.fillStyle = "#ffce82";
      ctx.fillText(label, bx + pad, by + 15);
    }
  }

  function frame() {
    requestAnimationFrame(frame);
    if (!model) return;
    if (fade < 1) fade = Math.min(1, fade + 0.16);
    ctx.clearRect(0, 0, stage.width, stage.height);
    lerpFrameDraw();
    drawHUD();
  }

  // ---------- events ----------
  function pointerToCanvas(e) {
    const b = stage.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - b.left, y: p.clientY - b.top };
  }
  stage.addEventListener("pointermove", (e) => {
    cursor = pointerToCanvas(e);
    if (e.pointerType !== "touch") refocusFromCursor();
  });
  stage.addEventListener("pointerleave", () => (cursor = null));
  stage.addEventListener("pointerdown", (e) => {
    cursor = pointerToCanvas(e);
    refocusFromCursor();
    stage.classList.remove("pulse");
    void stage.offsetWidth;
    stage.classList.add("pulse");
  });

  el("depthBtn").addEventListener("click", (e) => {
    showDepth = !showDepth;
    e.currentTarget.setAttribute("aria-pressed", String(showDepth));
  });
  document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "d" && model) el("depthBtn").click();
  });

  const fileInput = el("file");
  el("loadBtn").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => loadFiles(e.target.files));

  const drop = document.body;
  ["dragenter", "dragover"].forEach((t) =>
    drop.addEventListener(t, (e) => {
      e.preventDefault();
      drop.classList.add("dragging");
    })
  );
  ["dragleave", "drop"].forEach((t) =>
    drop.addEventListener(t, (e) => {
      e.preventDefault();
      if (t === "drop" && e.dataTransfer.files.length) loadFiles(e.dataTransfer.files);
      drop.classList.remove("dragging");
    })
  );

  window.addEventListener("resize", resize);
  requestAnimationFrame(frame);

  // ---------- boot: try the bundled sample ----------
  window.__loadLFP = load; // used by the self-contained build
  async function boot() {
    if (window.__SAMPLE_B64__) {
      const bin = atob(window.__SAMPLE_B64__);
      const u8 = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
      load(u8.buffer, "sample");
      return;
    }
    try {
      const resp = await fetch("demo/demo.LFP");
      if (resp.ok) load(await resp.arrayBuffer(), "demo.LFP");
      else setStatus("Drop a .lfp living picture to begin.");
    } catch {
      setStatus("Drop a .lfp living picture to begin.");
    }
  }
  boot();
})();

</script>
</body>
</html>
